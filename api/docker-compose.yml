services:
  mongodb:
    image: mongo:7
    container_name: "3d-figures-mongodb"
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    environment:
      # Creates the default DB at first startup (no auth configured).
      MONGO_INITDB_DATABASE: 3d-figures
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand('ping')\" || mongo --quiet --eval \"db.adminCommand('ping')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot replica-set initializer (runs once Mongo is healthy).
  # This is required for Prisma writes on MongoDB.
  mongodb-init:
    image: mongo:7
    container_name: "3d-figures-mongodb-init"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    command: [
      "bash",
      "-lc",
      "mongosh --host mongodb:27017 --quiet --eval \"try { rs.status(); } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }); }\""
    ]

  api:
    build: .
    container_name: "3d-figures-api"
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      # Prisma requires a replica set for writes; compose Mongo is started with --replSet rs0.
      DATABASE_URL: mongodb://mongodb:27017/3d-figures?replicaSet=rs0
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully

volumes:
  mongodb-data:

